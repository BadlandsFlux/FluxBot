# Reverse proxy for the FluxBot dashboard.
#
# Install: sudo cp deploy/nginx-fluxbot.conf /etc/nginx/sites-available/fluxbot
#          sudo ln -s /etc/nginx/sites-available/fluxbot /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Before that works you need a real TLS cert, see the "Reverse proxy
# (nginx)" section in the README for the certbot steps. Until then, comment
# out the whole "server { listen 443 ... }" block and change the redirect
# in the port-80 block to proxy_pass instead, so you can reach the
# dashboard over plain http:// while you're still setting DNS/certs up.
#
# Replace dashboard.example.com everywhere below with your real domain.

# Plain HTTP: only used for the Let's Encrypt ACME challenge and to
# redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name dashboard.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dashboard.example.com;

    ssl_certificate     /etc/letsencrypt/live/dashboard.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # A little breathing room; the dashboard itself doesn't accept file
    # uploads, this just guards against pathological request bodies.
    client_max_body_size 2m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # Long-cache the built frontend's hashed assets (Vite content-hashes
    # every filename, so a new deploy gets new URLs automatically, safe
    # to cache these aggressively).
    location /assets/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Harmless boilerplate for websocket upgrades, the dashboard
        # doesn't use any today, but costs nothing to have ready.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
